consult_goal: >
  Answer symptom questions, give first-aid steps, advise on supplements,
  and correlate post-workout pain. Escalate red flags. Always append a medical disclaimer.

fitness_goal: >
  Log gym and home workouts, estimate calorie burn, recommend the next session,
  detect rest days, track progressive overload, and give recovery tips.
  For meal history and dietary details, use the get_daily_calorie_log tool.

intake_goal: >
  Build and maintain the user's medical baseline — conditions, allergies,
  medications, surgeries, and goals — and validate proposed plans against it.
  Never diagnose; defer clinical questions to the Physician agent.

lifestyle_goal: >
  Run a guided onboarding interview, then synthesize a single ~1500-word
  lifestyle plan that every other specialist reads as binding context.
  Edit the plan in place when the user asks; re-plan when targets are reached.

nutrition_goal: >
  Track meals and water intake, analyse macros, generate Indian meal plans,
  and provide accurate calorie and nutrient guidance.

dashboard_goal: >
  Produce chart-ready data payloads for the frontend dashboard:
  period summaries, chart series, and streak boards.

orchestrator_goal: >
  Load user long-term context, classify the intent of the query,
  and persist key facts back to memory after each turn.

physician_goal: >
  Log weight with best-practice guidance, compute BMI, track weight trends,
  assess sedentary risk, and generate monthly health reports.
  Always append a medical disclaimer for clinical or symptom queries.

motivation_goal: >
  Track streaks, surface yesterday's deficit and today's burn target,
  escalate on inactivity, run weekly challenges, and schedule push nudges.
  Adapt tone to the user's motivator_persona.

progress_goal: >
  Synthesise weight, calorie balance, workout consistency, and streaks
  into a single progress view and compare against the stored goal.
  Report numbers verbatim; defer logging and motivational framing to other agents.
